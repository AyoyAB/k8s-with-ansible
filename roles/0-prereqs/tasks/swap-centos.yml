# This task disables swap for Kubernetes node (see https://github.com/kubernetes/kubernetes/pull/31996)
# https://linuxize.com/post/how-to-add-swap-space-on-centos-7/
- name: Disable swap
  command: |
    swapoff -a -v
  when: ansible_swaptotal_mb > 0

- name: Make sure swap is removed from /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    state: absent
    regexp: 'swap'
